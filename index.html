<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-[#020C1B]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiloto de Decisão | Diagnóstico Corporativo Avançado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex flex-col min-h-screen bg-[#020C1B] text-slate-300 antialiased font-sans">

    <header class="bg-[#0A192F] border-b border-white/10 py-4 print:hidden">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo2.png" alt="Nexus Studio" class="h-10 object-contain rounded">
            </div>
            <div class="hidden sm:flex items-center gap-2 text-[#C59A3F] text-sm font-bold tracking-wide uppercase">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                Copiloto de Decisão
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-4xl bg-[#0A192F] rounded-2xl shadow-2xl overflow-hidden border border-white/10 flex flex-col">
            
            <div id="progress-container" class="border-b border-white/10 p-6 print:hidden">
                <div class="flex justify-between items-center mb-2">
                    <span id="step-label" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Carregando...</span>
                    <span id="step-percentage" class="text-xs font-bold text-[#C59A3F] bg-[#C59A3F]/10 px-2 py-1 rounded">0%</span>
                </div>
                <div class="w-full bg-[#172A45] rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-[#C59A3F] h-full w-0 transition-all duration-300 ease-out"></div>
                </div>
            </div>

            <div id="wizard-content" class="p-6 md:p-10 flex-grow transition-opacity duration-200">
                </div>

        </div>
    </main>

    <footer class="bg-[#020C1B] text-slate-500 py-6 text-center text-xs border-t border-white/10 print:hidden mt-auto">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-2 sm:gap-4 text-center sm:text-left">
                <p>&copy; 2026 Copiloto de Decisão. Todos os direitos reservados.</p>
                <span class="hidden sm:inline text-white/20">|</span>
                <p class="text-[#C59A3F]/70 flex items-center gap-1">
                    <i data-lucide="shield-alert" class="w-3.5 h-3.5 inline"></i> 
                    Seus dados estão protegidos e criptografados em conformidade com a LGPD.
                </p>
            </div>
            <div class="flex items-center gap-2">
                <span>Powered by</span>
                <span class="font-bold text-white">Nexus Studio</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
